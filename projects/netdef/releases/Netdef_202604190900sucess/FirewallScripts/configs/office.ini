; ============================================================
; Netdef Office Profile - Corporate Network Mode
; ============================================================
; Use this when: Working at company office on corporate network
;
; SECURITY LEVEL: Medium (Productivity-Focused)
; BEST FOR: Remote workers, consultants, office employees
;
; This profile balances security with usability for work environments
; where you need access to internal resources and cloud services.
;
; ============================================================

[Inbound]
; Your office network's IP range(s)
; Ask IT admin or check: ipconfig /all
; Common corporate ranges:
;   - 10.x.x.x (Class A private)
;   - 172.16.x.x - 172.31.x.x (Class B private)
;   - 192.168.x.x (Class C private)
; Example: TrustedRanges = 10.147.20.0-10.147.30.255
TrustedRanges = 10.147.29.100-10.147.29.160

[Outbound]
; Usually keep disabled in office (IT handles perimeter security)
Enable = 0
AllowedRanges = 

[OutboundPorts]
; May not need port blocking in office (corporate firewall should handle it)
; But enable if you want extra protection:
BlockTCP = 
BlockUDP = 

[Wail2Ban]
; Optional in office (depends on company policy)
AutoStart = 0
Path = wail2ban\wail2ban.ps1

EventIDs = 4625
FindTime = 300
MaxRetry = 5
BanTimes = 3600,18000,90000,450000,7776000

; ============================================================
; NOTES FOR OFFICE USE:
;
; ✅ This profile assumes your corporate network has:
;    - Firewall/IDS at perimeter
;    - IT-managed security policies
;    - Internal DNS, DHCP, etc.
;
; ⚠️ Check with IT before using Wail2Ban:
;    - Some companies have their own intrusion detection
;    - Wail2Ban might conflict with corporate security tools
;    - Better to ask permission first!
;
; 🔧 Customization ideas:
;    - Add VPN server IPs to AllowedRanges if using company VPN
;    - Trust internal servers (file shares, printers, etc.)
;    - Relax restrictions if IT complains about connectivity issues
;
; ============================================================
