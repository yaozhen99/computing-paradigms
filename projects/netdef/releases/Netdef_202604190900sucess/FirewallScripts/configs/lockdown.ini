; ============================================================
; Netdef Lockdown Profile - Maximum Security Mode
; ============================================================
; Use this when: Handling sensitive data, post-incident forensics,
;                or when you suspect your device may be compromised
;
; SECURITY LEVEL: MAXIMUM (Tinfoil Hat Approved 😄)
; BEST FOR: Developers with API keys, financial transactions,
;           handling PII, "I think I'm hacked" moments
;
; ⚠️ WARNING: This will break many applications!
;    Only use when you REALLY need maximum isolation.
;
; How it works:
;   1. Blocks ALL inbound except explicitly whitelisted
;   2. Blocks ALL outbound except explicitly whitelisted
;   3. Wail2Ban at maximum sensitivity
;   4. Detailed logging enabled
;   5. Paranoid but practical
;
; ============================================================

[Inbound]
; Only allow localhost - block everything else
TrustedRanges = 127.0.0.1

[Outbound]
; 🔒 ENABLE OUTBOUND BLOCKING (this is what makes it "lockdown")
Enable = 1
; Specify which outbound targets are allowed
; Options:
;   - Empty string = BLOCK ALL OUTBOUND (maximum security, no internet!)
;   - 0.0.0.0/0 = Allow all outbound (but you're in whitelist mode now)
;   - Specific IPs = Only allow those targets
;
; Example: Allow only corporate VPN server and DNS
; AllowedRanges = 10.0.0.1,8.8.8.8,1.1.1.1

; For most users, keep empty to truly lock down:
AllowedRanges = 

[OutboundPorts]
; Block everything possible on public profile
BlockTCP = 135,139,445,3389,5900,8080,8443,20,21,22,23,25,53,110,143,993,995,1433,3306,5432,6379,27017,9200
BlockUDP = 137,138,1900,5353,53,67,123,161,500,514,1812,1813

[Wail2Ban]
; Maximum sensitivity
AutoStart = 1
Path = wail2ban\wail2ban.ps1

EventIDs = 4625

; Very short window (catch fast attackers)
FindTime = 60

; Ban after just 2 failures (zero tolerance)
MaxRetry = 2

; Start with long bans
BanTimes = 86400,604800,2592000,7776000,31536000

; ============================================================
; USE CASES:
;
; 🏦 Banking/Finance Sessions
;    - Block all non-essential traffic during online banking
;    - Prevent malware from exfiltrating data
;    - Ensure only bank website is accessible
;
; 🔑 API Key / Credential Work
;    - Developing with secrets in environment variables
;    - Deploying to production
;    - Accessing password managers
;
; 🚨 Post-Incident Response
;    - Suspect device compromise? Lock down immediately.
;    - While you investigate and clean up
;    - Prevent data exfiltration by malware
;
; 📊 Forensic Analysis
;    - Need to capture all network activity?
;    - Enable logging, review later
;    - Minimal noise from blocked traffic
;
; ============================================================
