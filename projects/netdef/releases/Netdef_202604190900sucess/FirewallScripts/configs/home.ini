; ============================================================
; Netdef Home Profile - Trusted LAN Environment
; ============================================================
; Use this when you're at home, connected to your personal router
; This is the DEFAULT and SAFEST profile for daily use
;
; SECURITY LEVEL: Standard (Balanced)
; BEST FOR: Families, home labs, gaming PCs, smart homes
;
; How it works:
;   1. Blocks ALL inbound connections by default
;   2. Allows ONLY devices in your trusted IP range
;   3. Permits all outbound traffic (home network = safe)
;   4. Optionally starts Wail2Ban for extra protection
;
; ⚠️ IMPORTANT: Devices in your trusted range can access
;    each other freely (any port, any protocol). Keep the
;    range as small as possible and ensure all devices are secure!
; ============================================================

[Inbound]
; Your home devices (check your router's DHCP settings)
; Format: StartIP-EndIP or SingleIP, comma-separated for multiple ranges
;
; Common examples by router brand:
;   TP-Link:     192.168.1.100-192.168.1.199
;   ASUS:       192.168.50.100-192.168.50.199
;   Netgear:    192.168.1.2-192.168.1.254
;   D-Link:     192.168.0.100-192.168.0.199
;   Generic:    10.0.0.1-10.0.0.255
;
; To find your range:
;   1. Open Command Prompt: ipconfig
;   2. Note your IPv4 Address (e.g., 192.168.1.105)
;   3. Check router admin page for DHCP range
;   4. Or use IP scanner tool to see active devices
TrustedRanges = 192.168.1.100-192.168.1.200

[Outbound]
; Allow all outbound (home network is considered trusted)
; Set to 1 ONLY if you want to restrict outbound connections
Enable = 0
; If Enable=1, specify which outbound targets are allowed
; Empty = BLOCK ALL OUTBOUND (use with caution!)
AllowedRanges = 

[OutboundPorts]
; Port blocking not typically needed for home network
; Leave empty or comment out - these only apply to Travel Mode
BlockTCP = 
BlockUDP = 

[Wail2Ban]
; Auto-start recommended for always-on intrusion detection
; Set to 1 to automatically start Wail2Ban when applying this profile
AutoStart = 1
; Wail2Ban script path (relative to FirewallScripts directory)
Path = wail2ban\wail2ban.ps1

; Windows Security Event IDs to monitor
; Default: 4625 = Failed login attempt (covers RDP, SMB, etc.)
EventIDs = 4625

; Time window in seconds to count failures
; 300 seconds = 5 minutes (if attacker fails 5 times in 5 min → BAN)
FindTime = 300

; Number of failures within time window to trigger ban
MaxRetry = 5

; Ban duration escalation (in seconds)
; Each subsequent offense gets longer ban:
;   Offense 1: 3600    = 1 hour
;   Offense 2: 18000   = 5 hours
;   Offense 3: 90000   = 25 hours (~1 day)
;   Offense 4: 450000  = ~125 hours (~5 days)
;   Offense 5: 7776000 = 90 days (effectively permanent)
BanTimes = 3600,18000,90000,450000,7776000

; ============================================================
; TIPS:
;
; ✅ DO:
;    - Keep TrustedRanges tight (only your actual devices)
;    - Enable Wail2Ban AutoStart for 24/7 protection
;    - Update ranges when you add new devices to network
;    - Test from a device outside range to verify blocking works
;
; ❌ DON'T:
;    - Use broad ranges like 192.168.0.0-192.168.255.255
;    - Forget about guest devices (phones, IoT, etc.)
;    - Ignore Wail2Ban logs (they show real attack attempts!)
;    - Share this config file with untrusted parties (contains your IPs)
;
; 🔧 CUSTOMIZATION:
;    - Add more EventIDs if you want to monitor other events
;      (e.g., 4624 = successful login, for auditing)
;    - Adjust FindTime/MaxRetry based on your tolerance
;      (Lower values = more aggressive banning)
;    - Shorten BanTimes if you're testing frequently
;
; ============================================================
