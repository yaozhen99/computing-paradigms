[Inbound]
; Trusted IP ranges for inbound whitelist (REQUIRED - at least one range needed)
; Format: StartIP-EndIP or single IP, multiple ranges separated by commas
; Example: 192.168.1.100-192.168.1.200, 10.0.0.5
TrustedRanges = 10.147.29.100-10.147.29.160

[Outbound]
; Enable outbound IP whitelist (0=disabled, 1=enabled)
Enable = 0
; Outbound allowed target IP ranges (only effective when Enable=1)
AllowedRanges = 

[OutboundPorts]
; TCP ports to block outbound (comma-separated)
BlockTCP = 135,139,445,3389
; UDP ports to block outbound
BlockUDP = 137,138

[Wail2Ban]
; Auto-start Wail2Ban when running security profiles (0=prompt, 1=auto-start)
AutoStart = 0
; Wail2Ban script path (relative or absolute from FirewallScripts directory)
Path = wail2ban\wail2ban.ps1
; Windows Event IDs to monitor (default: 4625 = login failure)
EventIDs = 4625
; Time window in seconds to count failures (default: 300 = 5 minutes)
FindTime = 300
; Number of failures within time window to trigger ban (default: 5)
MaxRetry = 5
; Ban duration in seconds for each offense level (escalating)
; Format: first_offense, second_offense, third_offense, ...
; Default: 1h, 5h, 25h, 125h, 90 days
BanTimes = 3600,18000,90000,450000,7776000
