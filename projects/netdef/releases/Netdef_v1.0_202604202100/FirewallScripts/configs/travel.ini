; ============================================================
; Netdef Travel Profile - Public WiFi Maximum Protection
; ============================================================
; Use this at: Coffee shops, hotels, airports, conferences,
;              libraries, co-working spaces, ANY public network
;
; SECURITY LEVEL: HIGH (Paranoid Mode)
; BEST FOR: Remote workers, travelers, privacy-conscious users
;
; ⚠️ WARNING: This profile is VERY RESTRICTIVE by design!
;    It assumes the network is hostile and locks down everything.
;
; How it works:
;   1. Blocks ALL inbound (except localhost - no trusted IPs!)
;   2. Blocks dangerous OUTBOUND ports (malware prevention)
;   3. Enables aggressive logging and anomaly detection
;   4. Starts Wail2Ban with heightened sensitivity
;   5. Alerts if >100 connections dropped in 5 minutes (scan attack)
;
; Why you need this:
;    ☠️ Public WiFi is a hacker playground (evil twins, ARP spoofing)
;    ☠️ Port scanners target hotel/coffee shop networks daily
;    ☠️ Malware tries to "phone home" via SMB/RDP ports
;    ☠️ Your laptop is visible to everyone on same subnet
;
; ============================================================

[Inbound]
; Block EVERYTHING except loopback
; On public networks, there are NO trusted IPs
; Even if you "know" someone on same WiFi, don't trust the network!
TrustedRanges = 127.0.0.1

[Outbound]
; Optional outbound filtering
; Keep disabled (0) for normal internet access
; Only enable (1) in Lockdown mode when handling sensitive data
Enable = 0
; If enabled, specify allowed outbound targets (or leave empty = block all)
AllowedRanges = 

[OutboundPorts]
; 🔥 CRITICAL: Block these dangerous egress ports!
; These are commonly exploited or used by malware:
;
; TCP Ports Blocked:
;   135  - Microsoft RPC (used by Blaster worm, many exploits)
;   139  - NetBIOS Session Service (file sharing attacks)
;   445  - SMB/CIFS (WannaCry, NotPetya, EternalBlue)
;   3389 - Remote Desktop Protocol (RDP brute force targets)
;   5900 - VNC (remote desktop, often unencrypted)
;   8080 - Alternative HTTP (proxy, dev servers)
;   8443 - Alternative HTTPS (proxy, admin panels)
;
; UDP Ports Blocked:
;   137  - NetBIOS Name Service (network reconnaissance)
;   138  - NetBIOS Datagram (browser service attacks)
;   1900 - UPnP/SSDP (device discovery, Mirai botnet target)
;   5353 - mDNS/Bonjour (Apple device discovery, DNS amplification)
BlockTCP = 135,139,445,3389,5900,8080,8443
BlockUDP = 137,138,1900,5353

[Wail2Ban]
; ALWAYS auto-start on public networks - you need 24/7 monitoring here!
AutoStart = 1
Path = wail2ban\wail2ban.ps1

; Monitor failed login attempts
EventIDs = 4625

; More sensitive than home mode (catch attackers faster)
; 180 seconds = 3 minutes (was 5 min at home)
FindTime = 180

; Ban faster on public networks (less tolerance)
; 3 failures in 3 minutes → BAN (was 5 failures)
MaxRetry = 3

; Shorter initial bans (for testing), but still escalate
; Offense 1: 30 minutes (quick feedback that it's working)
; Offense 2: 2 hours
; Offense 3: 8 hours
; Offense 4: 24 hours
; Offense 5: 7 days
BanTimes = 1800,7200,28800,86400,604800

; ============================================================
; 🎯 WHEN TO USE THIS PROFILE:
;
; ✅ USE WHEN:
;    - Connected to "CoffeeShop_WiFi_Free" or similar
;    - At hotel with shared network for all guests
;    - Airport lounge (thousands of strangers on same subnet)
;    - Conference center (hackers love targeting conferences!)
;    - Anywhere you didn't set up the router yourself
;    - Handling work documents on public network
;    - Using online banking/shopping (extra caution)
;
; ❌ DON'T USE WHEN:
;    - At home (too restrictive, use home.ini instead)
;    - Office with IT-managed network (they have their own security)
;    - Need to share files with nearby devices (ports blocked!)
;    - Running local servers that need external access
;
; ⚠️ EXPECTED BEHAVIOR:
;    - File sharing to other laptops → BLOCKED ✅ (this is intentional!)
;    - Someone trying RDP to your PC → BLOCKED ✅
;    - Normal web browsing (HTTP/HTTPS) → WORKS FINE ✅
;    - Email, SSH, VPN → WORKS FINE ✅
;    - Online gaming → MAY BE AFFECTED (some games use odd ports)
;    - Streaming video → SHOULD WORK (Netflix, YouTube, etc.)
;
; 🔧 TROUBLESHOOTING:
;
; Q: "I can't print to hotel printer!"
; A: Printers use port 9100-9107. Add them to allowed list if needed,
;    but be aware this slightly reduces security.
;
; Q: "My VPN won't connect!"
; A: Most VPNs use UDP 1194 or 443. These should work fine.
;    If not, check which port your VPN uses.
;
; Q: "Gaming lag / can't connect to game server!"
; A: Games use many ports. For serious gaming, consider using
;    office.ini instead (less restrictive) or add game-specific ports.
;
; Q: "Alert says 150 drops in 5 minutes - am I under attack?!"
; A: Possibly! Check Wail2Ban logs for banned IPs.
;    Could also be noisy network (mDNS broadcasts, etc.)
;    If concerned, disconnect from WiFi immediately.
;
; ============================================================
; ADVANCED OPTIONS (Uncomment to enable):
;
; ; Monitor additional event IDs
; ; 4624 = Successful login (audit trail)
; ; 4634 = Logoff event
; ; EventIDs = 4625,4624
;
; ; Ultra-paranoid mode (ban on 2nd failure!)
; ; MaxRetry = 2
;
; ; Instant 24-hour ban for first offense
; ; BanTimes = 86400
;
; ============================================================
